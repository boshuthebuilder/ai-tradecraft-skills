name: lint
on:
  push:
  pull_request:
jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      - name: Lint SKILL.md frontmatter
        run: python scripts/lint_skills.py
